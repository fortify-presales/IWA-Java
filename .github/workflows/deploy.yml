name: Build and Deploy to AWS Ubuntu

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  APP_NAME: iwa
  JAR_NAME: iwa-${{ github.sha }}.jar
  BUILD_JAR: build/libs/iwa-1.0.jar

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      artifact-path: ${{ steps.upload-artifact.outputs.artifact-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build jar
        run: ./gradlew --no-daemon clean bootJar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ./artifact

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy jar to server
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          scp -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -P ${SSH_PORT:-22} ./artifact/*.jar ${EC2_USER}@${EC2_HOST}:/tmp/${{ env.APP_NAME }}.jar

      - name: Copy deploy script to server
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          scp -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -P ${SSH_PORT:-22} deploy/remote_deploy.sh ${EC2_USER}@${EC2_HOST}:/tmp/remote_deploy.sh

      - name: Run remote deploy
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key -p ${SSH_PORT:-22} ${EC2_USER}@${EC2_HOST} 'bash /tmp/remote_deploy.sh /tmp/${APP_NAME}.jar'

      - name: Cleanup local key
        if: always()
        run: rm -f ~/.ssh/deploy_key

# Note: the following secrets must be added to the repository settings:
# SSH_PRIVATE_KEY, SSH_KNOWN_HOSTS, EC2_USER, EC2_HOST, SSH_PORT (optional)
# You can also add DB secrets and other env vars as GitHub Secrets and write them
# to the server's shared config directory during first-setup.
